name: corner
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^4.3.0
  firebase_auth: ^6.1.3
  google_sign_in: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_native_splash: ^2.3.1

flutter:
  uses-material-design: true

  # Asset delle immagini
  assets:
    - assets/images/

  # Configurazione dei Font
  fonts:
    - family: Instagram Sans
      fonts:
        - asset: assets/fonts/Instagram Sans.ttf
          # Senza 'weight', questo è il font normale (Regular - w400)
        
        - asset: assets/fonts/Instagram Sans Medium.ttf
          weight: 500 # Medium
        
        - asset: assets/fonts/Instagram Sans Bold.ttf
          weight: 700 # Bold

flutter_native_splash:
  color: "#B8B5A4"
  image: assets/images/splashScreen_corner.png
  android_12:
    image: assets/images/splashScreen_corner.png
    color: "#B8B5A4"