name: corner
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  audioplayers: ^6.0.0
  firebase_storage: ^13.0.6
  cupertino_icons: ^1.0.6
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.3
  google_nav_bar: ^5.0.7
  curved_navigation_bar: ^1.0.6
  image_picker: ^1.2.1       # Per accedere a galleria/camera
  cloud_firestore: ^6.1.2    # Per salvare l'URL nel profilo utente
  cached_network_image: ^3.3.0 # Ottimo per mostrare immagini dal web con cache
  #flutter_local_notifications: ^20.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_native_splash: ^2.3.1
  icons_launcher: ^3.0.3

flutter:
  uses-material-design: true

  # Asset delle immagini
  assets:
    - assets/images/
    - assets/audio/
  # Configurazione dei Font
  fonts:
    - family: Instagram Sans
      fonts:
        - asset: assets/fonts/Instagram Sans.ttf
          # Senza 'weight', questo è il font normale (Regular - w400)
        
        - asset: assets/fonts/Instagram Sans Medium.ttf
          weight: 500 # Medium
        
        - asset: assets/fonts/Instagram Sans Bold.ttf
          weight: 700 # Bold

flutter_native_splash:
  color: "#B8B5A4"
  image: assets/images/splashScreen_corner.png
  android_12:
    image: assets/images/splashScreen_corner.png
    color: "#B8B5A4"

icons_launcher:
  image_path: 'assets/icon/icon_removebg.png'
  platforms:
    android:
      enable: true
      adaptive_background_color: '#B8B5A4'
      adaptive_foreground_image: 'assets/icon/icon_removebg.png'
    ios:
      enable: true